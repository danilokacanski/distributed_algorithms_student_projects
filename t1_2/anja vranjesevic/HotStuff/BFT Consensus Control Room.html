document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>BFT Consensus Control Room — HotStuff Interbank Ledger<\u002Ftitle>\n\n<style>\n/* =========================================================================\n   BFT CONSENSUS CONTROL ROOM\n   Single self-contained file. No external CDNs / fonts / network calls.\n   Dark \"observatory\" aesthetic. Monospace for all hashes & log.\n   ========================================================================= */\n\n:root{\n  --bg:#0a0e13;\n  --panel:#111820;\n  --panel2:#0d141b;\n  --line:#1d2833;\n  --line2:#2a3947;\n  --ink:#c9d6e2;\n  --ink-dim:#7c8b9b;\n  --ink-faint:#54637140;\n  --mono:ui-monospace,\"SF Mono\",Menlo,Consolas,\"Liberation Mono\",monospace;\n  --sans:system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif;\n\n  /* phase palette (one distinct hue per HotStuff phase) */\n  --p-newview:#8b97a6;\n  --p-prepare:#4a9eff;\n  --p-precommit:#22d3ee;\n  --p-commit:#f5a623;   /* COMMIT = the LOCK phase = safety-critical (amber) */\n  --p-decide:#4ade80;\n  --p-generic:#5a6b7a;\n\n  --ok:#4ade80;\n  --bad:#f0596a;\n  --warn:#f5a623;\n  --qc:#b57bff;\n}\n\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;background:var(--bg);color:var(--ink);\n  font-family:var(--sans);font-size:13px;line-height:1.4;\n  overflow:hidden; /* no page scroll; panels scroll internally */\n}\na{color:var(--p-prepare)}\na:hover{color:#7bb8ff}\n.mono{font-family:var(--mono)}\n\n/* ---- overall grid ------------------------------------------------------- */\n#app{\n  height:100vh;display:grid;gap:8px;padding:8px;\n  grid-template-rows:auto 1fr auto;\n}\n.stage{\n  display:grid;gap:8px;min-height:0;\n  grid-template-columns:300px 1fr 340px;\n  grid-template-rows:1fr 1fr;\n  grid-template-areas:\n    \"replicas bus ledger\"\n    \"replicas tree log\";\n}\n#panel-replicas{grid-area:replicas}\n#panel-bus{grid-area:bus}\n#panel-ledger{grid-area:ledger}\n#panel-tree{grid-area:tree}\n#panel-log{grid-area:log}\n\n.panel{\n  background:var(--panel);border:1px solid var(--line);border-radius:8px;\n  display:flex;flex-direction:column;min-height:0;min-width:0;overflow:hidden;\n}\n.panel > .phead{\n  flex:0 0 auto;display:flex;align-items:center;gap:8px;\n  padding:7px 11px;border-bottom:1px solid var(--line);\n  font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);\n}\n.panel > .phead .grow{flex:1}\n.pbody{flex:1;min-height:0;overflow:auto;padding:11px}\n\n/* thin scrollbars */\n.pbody::-webkit-scrollbar,.log-list::-webkit-scrollbar{width:9px;height:9px}\n.pbody::-webkit-scrollbar-thumb,.log-list::-webkit-scrollbar-thumb{background:#26333f;border-radius:6px;border:2px solid var(--panel)}\n.pbody::-webkit-scrollbar-track{background:transparent}\n\n/* =========================================================================\n   TOP BAR\n   ========================================================================= */\n#topbar{\n  background:var(--panel);border:1px solid var(--line);border-radius:8px;\n  display:flex;align-items:center;gap:18px;padding:9px 14px;flex-wrap:wrap;\n}\n.brand{display:flex;flex-direction:column;line-height:1.15}\n.brand b{font-size:13px;letter-spacing:.02em}\n.brand span{font-size:10px;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase}\n.constants{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}\n.constants b{color:var(--ink)}\n\nselect{\n  background:var(--panel2);color:var(--ink);border:1px solid var(--line2);\n  border-radius:6px;padding:6px 9px;font-family:var(--sans);font-size:12px;cursor:pointer;\n}\nselect:focus{outline:1px solid var(--p-prepare)}\n\n.tb-block{display:flex;flex-direction:column;align-items:flex-start;gap:2px}\n.tb-label{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim)}\n.view-num{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1;color:#fff}\n.leader-chip{\n  display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:17px;font-weight:600;\n}\n.leader-chip .crown{font-size:15px}\n\n.phase-track{display:flex;align-items:center;gap:6px;margin-left:auto}\n.phase-pill{\n  font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;\n  padding:5px 10px;border-radius:20px;border:1px solid var(--line2);\n  color:var(--ink-dim);background:var(--panel2);transition:all .25s ease;white-space:nowrap;\n}\n.phase-pill.active{color:#0a0e13;border-color:transparent}\n.phase-arrow{color:var(--ink-faint);font-size:11px}\n.phase-pill[data-p=\"prepare\"].active{background:var(--p-prepare)}\n.phase-pill[data-p=\"pre-commit\"].active{background:var(--p-precommit)}\n.phase-pill[data-p=\"commit\"].active{background:var(--p-commit)}\n.phase-pill[data-p=\"decide\"].active{background:var(--p-decide)}\n\n.safety-flag{\n  display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;\n  padding:5px 10px;border-radius:6px;border:1px solid var(--line2);color:var(--ink-dim);\n}\n.safety-flag.safe{color:var(--ok);border-color:#1f4a34;background:#0e2016}\n.safety-flag.violation{color:#fff;border-color:var(--bad);background:#3a1418;animation:blink .7s steps(2,end) infinite}\n@keyframes blink{50%{opacity:.4}}\n\n/* =========================================================================\n   REPLICA PANEL\n   ========================================================================= */\n#replica-grid{display:grid;grid-template-columns:1fr;gap:9px}\n.node{\n  position:relative;background:var(--panel2);border:1px solid var(--line);\n  border-radius:7px;padding:9px 10px;transition:border-color .3s,background .3s,box-shadow .3s;\n  cursor:default;\n}\n.node.leader{border-color:#4a6a24;box-shadow:inset 0 0 0 1px #3a5a1e}\n.node.byzantine{border-color:#7a3a1e;background:#1c110b}\n.node.crashed{opacity:.5;filter:grayscale(.7)}\n.node.active::after{\n  content:\"\";position:absolute;inset:-1px;border-radius:7px;pointer-events:none;\n  box-shadow:0 0 0 2px currentColor;color:var(--p-prepare);\n  animation:pulse .7s ease-out;\n}\n@keyframes pulse{from{opacity:.9;transform:scale(1)}to{opacity:0;transform:scale(1.03)}}\n\n.node-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}\n.node-avatar{\n  width:26px;height:26px;border-radius:6px;display:grid;place-items:center;\n  font-family:var(--mono);font-weight:700;font-size:13px;color:#0a0e13;flex:0 0 auto;\n}\n.node-name{font-family:var(--mono);font-size:12px;font-weight:600}\n.node-name small{color:var(--ink-dim);font-weight:400}\n.badge{\n  margin-left:auto;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;\n  padding:3px 7px;border-radius:5px;background:#1d2833;color:var(--ink-dim);white-space:nowrap;\n}\n.badge.LEADER{background:#2f4517;color:#a6e05a}\n.badge.BYZANTINE{background:#4a2411;color:#f5a260}\n.badge.CRASHED{background:#33232a;color:#e88}\n.node-stats{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;font-family:var(--mono);font-size:11px}\n.node-stats .k{color:var(--ink-dim)}\n.node-stats .v{color:var(--ink);text-align:right}\n.node-last{\n  margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);\n  font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);\n  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\n}\n\n/* =========================================================================\n   MESSAGE BUS\n   ========================================================================= */\n#bus-wrap{flex:1;display:grid;place-items:center;min-height:0}\n#bus-svg{width:100%;height:100%;max-height:100%}\n.bus-node-ring{fill:var(--panel2);stroke:var(--line2);stroke-width:1.5}\n.bus-node-ring.leader{stroke:#7fbf3a;stroke-width:2.5}\n.bus-node-ring.crashed{stroke:#4a3a3a;stroke-dasharray:3 3}\n.bus-node-ring.byz{stroke:#c47a3a;stroke-width:2.5}\n.bus-node-label{font-family:var(--mono);font-weight:700;font-size:15px;fill:var(--ink);text-anchor:middle;dominant-baseline:central}\n.bus-edge{stroke:var(--line);stroke-width:1;fill:none}\n.bus-legend text{font-family:var(--mono);font-size:9px;fill:var(--ink-dim)}\n\n/* =========================================================================\n   LEDGER PANEL\n   ========================================================================= */\n.ledger-bars{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}\n.lrow{display:grid;grid-template-columns:20px 1fr 54px;align-items:center;gap:8px}\n.lrow .lname{font-family:var(--mono);font-weight:700;font-size:13px}\n.lbar-track{height:16px;background:var(--panel2);border:1px solid var(--line);border-radius:5px;overflow:hidden}\n.lbar-fill{height:100%;border-radius:4px 0 0 4px;transition:width .6s cubic-bezier(.4,0,.2,1);}\n.lrow .lval{font-family:var(--mono);font-size:12px;text-align:right;color:var(--ink)}\n.lrow.flash .lval{animation:valflash .7s ease}\n@keyframes valflash{0%{color:var(--p-decide)}100%{color:var(--ink)}}\n.conserve{\n  font-family:var(--mono);font-size:11px;padding:6px 9px;border-radius:6px;\n  border:1px solid #1f4a34;background:#0e2016;color:var(--ok);\n  display:flex;align-items:center;gap:7px;margin-bottom:11px;\n}\n.conserve.bad{border-color:var(--bad);background:#2a1418;color:var(--bad)}\n.hist-title{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px}\n.hist{display:flex;flex-direction:column;gap:5px}\n.hrow{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;padding:5px 7px;border-radius:5px;background:var(--panel2);border:1px solid var(--line)}\n.hrow .hcmd{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.htag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em}\n.htag.OK{background:#12331f;color:var(--ok)}\n.htag.REJECT{background:#33161a;color:var(--bad)}\n\n/* =========================================================================\n   BLOCK TREE\n   ========================================================================= */\n#tree-scroll{flex:1;overflow:auto;padding:10px}\n#tree-svg{display:block}\n.blk rect{transition:fill .3s,stroke .3s}\n.blk .b-hash{font-family:var(--mono);font-weight:700;font-size:12px;fill:#fff}\n.blk .b-meta{font-family:var(--mono);font-size:9.5px;fill:var(--ink-dim)}\n.blk .b-cmd{font-family:var(--mono);font-size:9px;fill:var(--ink-dim)}\n.tree-edge{stroke:var(--line2);stroke-width:1.5;fill:none}\n.tree-edge.chain{stroke:var(--p-decide);stroke-width:2.5}\n.tree-legend text{font-family:var(--mono);font-size:9px;fill:var(--ink-dim)}\n\n/* =========================================================================\n   EVENT LOG\n   ========================================================================= */\n.log-filters{display:flex;gap:6px;align-items:center;padding:6px 8px;border-bottom:1px solid var(--line);flex:0 0 auto}\n.log-filters select{padding:4px 6px;font-size:11px}\n.log-list{flex:1;overflow:auto;font-family:var(--mono);font-size:11px;padding:4px 0}\n.logline{\n  display:flex;gap:8px;padding:2px 10px;cursor:pointer;white-space:nowrap;\n  border-left:2px solid transparent;\n}\n.logline:hover{background:#182029}\n.logline.cur{background:#1a2531;border-left-color:#fff}\n.logline .lt{color:var(--ink-dim);width:42px;flex:0 0 auto;text-align:right}\n.logline .lk{width:82px;flex:0 0 auto;font-weight:700}\n.logline .ld{color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis}\n.logline.future{opacity:.34}\n\n/* =========================================================================\n   PLAYBACK CONTROLS\n   ========================================================================= */\n#controls{\n  background:var(--panel);border:1px solid var(--line);border-radius:8px;\n  display:flex;align-items:center;gap:14px;padding:8px 14px;\n}\n.btn{\n  background:var(--panel2);border:1px solid var(--line2);color:var(--ink);\n  border-radius:6px;height:32px;min-width:32px;padding:0 10px;cursor:p span>\n    <\u002Fdiv>\n    <select id=\"scenario\" title=\"Scenario\"><\u002Fselect>\n    <span class=\"constants\">n=<b>4<\u002Fb> · f=<b>1<\u002Fb> · quorum=<b>3<\u002Fb><\u002Fspan>\n\n    <div class=\"tb-block\">\n      <span class=\"tb-label\">View<\u002Fspan>\n      <span class=\"view-num mono\" id=\"view-num\">0<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"tb-block\">\n      <span class=\"tb-label\">Leader<\u002Fspan>\n      <span class=\"leader-chip\" id=\"leader-chip\"><span class=\"crown\">👑<\u002Fspan><span id=\"leader-name\">—<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"phase-track\" id=\"phase-track\">\n      <span class=\"phase-pill\" data-p=\"prepare\">Prepare<\u002Fspan><span class=\"phase-arrow\">›<\u002Fspan>\n      <span class=\"phase-pill\" data-p=\"pre-commit\">Pre-Commit<\u002Fspan><span class=\"phase-arrow\">›<\u002Fspan>\n      <span class=\"phase-pill\" data-p=\"commit\">Commit · Lock<\u002Fspan><span class=\"phase-arrow\">›<\u002Fspan>\n      <span class=\"phase-pill\" data-p=\"decide\">Decide<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"safety-flag safe\" id=\"safety-flag\">✓ SAFE<\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===================== STAGE ===================== -->\n  <div class=\"stage\">\n\n    <!-- REPLICAS -->\n    <section class=\"panel\" id=\"panel-replicas\">\n      <div class=\"phead\"><span>Replicas<\u002Fspan><span class=\"grow\"><\u002Fspan><span class=\"mono\" style=\"text-transform:none;letter-spacing:0\">banks A·B·C·D<\u002Fspan><\u002Fdiv>\n      <div class=\"pbody\"><div id=\"replica-grid\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- MESSAGE BUS -->\n    <section class=\"panel\" id=\"panel-bus\">\n      <div class=\"phead\"><span>Message Bus<\u002Fspan><span class=\"grow\"><\u002Fspan><span class=\"mono\" id=\"bus-hint\" style=\"text-transform:none;letter-spacing:0\">idle<\u002Fspan><\u002Fdiv>\n      <div id=\"bus-wrap\"><svg id=\"bus-svg\" viewBox=\"0 0 400 400\" preserveAspectRati lined HotStuff: each QC advances the committed three-chain\"}\n];\n\nconst SCENARIOS = {\n  \"double-spend\":{label:\"Double-spend (default)\", events:EV_DOUBLESPEND},\n  \"happy\":       {label:\"Happy path\",             events:EV_HAPPY},\n  \"crash\":       {label:\"Leader crash\",           events:EV_CRASH},\n  \"byzantine\":   {label:\"Byzantine leader\",       events:EV_BYZ},\n  \"chained\":     {label:\"Chained (pipelined)\",    events:EV_CHAINED}\n};\n\n// The active event array. Kept as `EVENTS` per the data contract.\nlet EVENTS = EV_DOUBLESPEND;\n\n/* =========================================================================\n   2. STATE RECONSTRUCTION  — pure function of events[0 .. idx)\n      (idx = number of events that have \"fired\". Scrubbing rebuilds fresh.)\n   ========================================================================= */\nfunction computeState(idx){\n  const st = {\n    view:0, leader:null, phase:null,\n    replicas:BANKS.map((b,i)=>({\n      i, name:b, crashed:false, byzantine:false,\n      view:0, lockedQC:null, prepareQC:null, committed:0, lastVote:null, lastAction:null\n    })),\n    blocks:new Map(), blockOrder:[],\n    balances:{A:100,B:100,C:0,D:100},\n    history:[],\n    safety:{state:\"safe\", detail:\"awaiting events\"}, // safe | violation | unknown\n    activeReplica:null, lastEvent:null\n  };\n\n  for(let k=0;k<idx;k++){\n    const e = EVENTS[k];\n    if(e.view!=null) st.view = e.view;\n    if(e.phase) st.phase = e.phase;\n\n    // per-replica view tracking\n    if(e.replica!=null && e.view!=null) st.replicas[e.replica].view = e.view;\n\n    // ---- block bookkeeping ----\n    if(e.node){\n      if(!st.blocks.has(e.node)){\n        st.blocks.set(e.node,{hash:e.node,parent:e.parent??null,view:e.view,cmd:e.cmd??null,status:\"proposed\"});\n        st.blockOrder.push(e.node);\n      }\n      const blk = st.blocks.get(e.node);\n      if(e.cmd) blk.cmd = e.cmd;\n      if(e.parent!=null) blk.parent = e.parent;\n      if(e.view!=null) blk.view = e.view;\n    }\n\n    switch(e.kind){\n      case \"vote\":\n        if(e.replica!=null){ st.replicas[e.replica].lastVote = (e.phase||\"\")+\" \"+(e.node||\"\"); }\n        break;\n      case \"QC\": {\n        if(e.node && st.blocks.has(e.node)){\n          const b=st.blocks.get(e.node); if(b.status===\"proposed\") b.status=\"qc\";\n        }\n        if(e.qc && e.replica!=null){ st.replicas[e.replica].prepareQC = e.qc.view; }\n        if(e.prepare_qc_view!=null && e.replica!=null) st.replicas[e.replica].prepareQC = e.prepare_qc_view;\n        break;\n      }\n      case \"LOCK\":\n        if(e.node && st.blocks.has(e.node)) st.blocks.get(e.node).status=\"locked\";\n        if(e.replica!=null && e.locked_qc_view!=null) st.replicas[e.replica].lockedQC = e.locked_qc_view;\n        break;\n      case \"DECIDE\":\n        if(e.node && st.blocks.has(e.node)) st.blocks.get(e.node).status=\"committed\";\n        if(e.balances) st.balances = Object.assign({},e.balances);\n        // every non-crashed replica commits this block\n        st.replicas.forEach(r=>{ if(!r.crashed) r.committed++; });\n        st.history.push({cmd:e.cmd||e.detail, outcome:e.outcome||\"OK\", view:e.view, node:e.node});\n        break;\n      case \"CRASH\":     if(e.replica!=null) st.replicas[e.replica].crashed=true; break;\n      case \"RESTART\":   if(e.replica!=null) st.replicas[e.replica].crashed=false; break;\n      case \"EQUIVOCATE\":\n      case \"CENSOR\":    if(e.replica!=null) st.replicas[e.replica].byzantine=true; break;\n      case \"SAFE\":      st.safety={state:\"safe\",detail:e.detail}; break;\n      case \"converge\":  st.safety={state:\"safe\",detail:e.detail}; break;\n      case \"SAFETY-VIOLATION\": st.safety={state:\"violation\",detail:e.detail}; break;\n      case \"DIVERGE\":   st.safety={state:\"violation\",detail:e.detail}; break;\n    }\n    if(e.replica!=null) st.replicas[e.replica].lastAction = e.kind+\" · \"+(e.detail||\"\");\n    st.lastEvent = e;\n  }\n\n  // leader is round-robin on current view\n  st.leader = st.view % BANKS.length;\n  // pulse: whoever acted on the just-fired event\n  st.activeReplica = idx>0 ? EVENTS[idx-1].replica : null;\n  return st;\n}\n\n/* role for a replica card given full state */\nfunction roleOf(r, st){\n  if(r.crashed) return \"CRASHED\";\n  if(r.byzantine) return \"BYZANTINE\";\n  if(r.i === st.leader) return \"LEADER\";\n  return \"replica\";\n}\n\n/* =========================================================================\n   3. RENDERING  (in-place updates so CSS transitions run)\n   ========================================================================= */\nlet replicaEls = [];    // persistent node card elements\nlet ledgerEls  = {};    // per-bank {row,fill,val}\nlet cur = 0;            // current fired-event index\nlet curT = 0;           // current playback time\n\nfunction buildReplicaCards(){\n  const grid = document.getElementById(\"replica-grid\");\n  grid.innerHTML=\"\";\n  replicaEls = BANKS.map((b,i)=>{\n    const el = document.createElement(\"div\");\n    el.className=\"node\"; el.dataset.i=i;\n    el.innerHTML = `\n      <div class=\"node-head\">\n        <div class=\"node-avatar\" style=\"background:${AVATAR_COLORS[i]}\">${b}<\u002Fdiv>\n        <div class=\"node-name\">Bank ${b} <small>· r${i}<\u002Fsmall><\u002Fdiv>\n        <div class=\"badge\">replica<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"node-stats\">\n        <span class=\"k\">view<\u002Fspan><span class=\"v\" data-f=\"view\">0<\u002Fspan>\n        <span class=\"k\">committed<\u002Fspan><span class=\"v\" data-f=\"committed\">0<\u002Fspan>\n        <span class=\"k\">lockedQC<\u002Fspan><span class=\"v\" data-f=\"locked\">—<\u002Fspan>\n        <span class=\"k\">prepareQC<\u002Fspan><span class=\"v\" data-f=\"prepare\">—<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"node-last\" data-f=\"last\">idle<\u002Fdiv>`;\n    // tooltip\n    el.addEventListener(\"mouseenter\",()=>showTip(i));\n    el.addEventListener(\"mousemove\",e=>moveTip(e));\n    el.addEventListener(\"mouseleave\",hideTip);\n    grid.appendChild(el);\n    return el;\n  });\n}\n\nfunction buildLedgerBars(){\n  const wrap = document.getElementById(\"ledger-bars\");\n  wrap.innerHTML=\"\";\n  ledgerEls={};\n  BANKS.forEach((b,i)=>{\n    const row=document.createElement(\"div\"); row.className=\"lrow\";\n    row.innerHTML=`<span class=\"lname\" style=\"color:${AVATAR_COLORS[i]}\">${b}<\u002Fspan>\n      <div class=\"lbar-track\"><div class=\"lbar-fill\" style=\"background:${AVATAR_COLORS[i]}\"><\u002Fdiv><\u002Fdiv>\n      <span class=\"lval\">—<\u002Fspan>`;\n    wrap.appendChild(row);\n    ledgerEls[b]={row,fill:row.querySelector(\".lbar-fill\"),val:row.querySelector(\".lval\")};\n  });\n}\n\nfunction render(st){\n  // ---- top bar ----\n  document.getElementById(\"view-num\").textContent = st.view;\n  document.getElementById(\"leader-name\").textContent =\n    st.leader!=null ? `${BANKS[st.leader]} · r${st.leader}` : \"—\";\n  // phase pills\n  const order=[\"prepare\",\"pre-commit\",\"commit\",\"decide\"];\n  document.querySelectorAll(\".phase-pill\").forEach(p=>{\n    p.classList.toggle(\"active\", p.dataset.p===st.phase);\n  });\n  // safety flag\n  const sf=document.getElementById(\"safety-flag\");\n  sf.className=\"safety-flag \"+(st.safety.state===\"violation\"?\"violation\":\"safe\");\n  sf.textContent = st.safety.state===\"violation\" ? \"⚠ SAFETY VIOLATION\" : \"✓ SAFE\";\n  sf.title = st.safety.detail;\n\n  // ---- replica cards ----\n  st.replicas.forEach((r,i)=>{\n    const el=replicaEls[i], role=roleOf(r,st);\n    el.classList.toggle(\"leader\", role===\"LEADER\");\n    el.classList.toggle(\"byzantine\", role===\"BYZANTINE\");\n    el.classList.toggle(\"crashed\", role===\"CRASHED\");\n    const badge=el.querySelector(\".badge\");\n    badge.className=\"badge \"+role;\n    badge.textContent = role===\"CRASHED\"?\"💀 crashed\":role===\"BYZANTINE\"?\"⚠ byzantine\":role;\n    el.querySelector('[data-f=\"view\"]').textContent=r.view;\n    el.querySelector('[data-f=\"committed\"]').textContent=r.committed;\n    el.querySelector('[data-f=\"locked\"]').textContent=r.lockedQC!=null?(\"v\"+r.lockedQC):\"—\";\n    el.querySelector('[data-f=\"prepare\"]').textContent=r.prepareQC!=null?(\"v\"+r.prepareQC):\"—\";\n    el.querySelector('[data-f=\"last\"]').textContent=r.lastVote?(\"last vote: \"+r.lastVote):(r.lastAction||\"idle\");\n    // pulse\n    el.classList.remove(\"active\");\n    if(i===st.activeReplica){ void el.offsetWidth; el.classList.add(\"active\"); }\n  });\n\n  // ---- ledger ----\n  const bals=st.balances, total=BANKS.reduce((s,b)=>s+(bals[b]||0),0);\n  const maxB=Math.max(1,...BANKS.map(b=>bals[b]||0));\n  BANKS.forEach(b=>{\n    const set=ledgerEls[b], v=bals[b]||0;\n    const prev=set.val.dataset.v;\n    set.fill.style.width=(v/maxB*100)+\"%\";\n    set.val.textContent=v;\n    if(prev!==undefined && prev!==String(v)){ set.row.classList.remove(\"flash\"); void set.row.offsetWidth; set.row.classList.add(\"flash\"); }\n    set.val.dataset.v=v;\n  });\n  const cons=document.getElementById(\"conserve\");\n  const START_TOTAL=300;\n  const ok = total===START_TOTAL;\n  cons.className=\"conserve\"+(ok?\"\":\" bad\");\n  cons.innerHTML = `<span>${ok?\"✓\":\"✗\"}<\u002Fspan><span>conserved: Σ balances = <b>${total}<\u002Fb> ${ok?\"= N (invariant holds)\":\"≠ N (LEAK!)\"}<\u002Fspan>`;\n\n  // ---- transfer history ----\n  const hist=document.getElementById(\"hist\");\n  hist.innerHTML=\"\";\n  if(!st.history.length){ hist.innerHTML=`<div style=\"color:var(--ink-dim);font-family:var(--mono);font-size:11px\">no commits yet<\u002Fdiv>`; }\n  st.history.slice().reverse().forEach(h=>{\n    const rej = h.outcome.startsWith(\"REJECT\");\n    const row=document.createElement(\"div\"); row.className=\"hrow\";\n    row.innerHTML=`<span class=\"hcmd\">${esc(h.cmd)}<\u002Fspan><span class=\"htag ${rej?\"REJECT\":\"OK\"}\">${esc(h.outcome)}<\u002Fspan>`;\n    hist.appendChild(row);\n  });\n\n  // ---- block tree ----\n  renderTree(st);\n  // ---- event log current highlight ----\n  renderLog();\n}\n\n/* ---- block tree (SVG, rebuilt each render) ------------------------------ */\nfunction renderTree(st){\n  const svg=document.getElementById(\"tree-svg\");\n  const blocks=st.blockOrder.map(h=>st.blocks.get(h));\n  if(!blocks.length){ svg.innerHTML=`<text x=\"14\" y=\"26\" fill=\"#54637190\" font-family=\"var(--mono)\" font-size=\"11\">no blocks proposed yet<\u002Ftext>`; svg.setAttribute(\"width\",300);svg.setAttribute(\"height\",60);return; }\n\n  // column per view (sorted); row per index within that view\n  const views=[...new Set(blocks.map(b=>b.view))].sort((a,b)=>a-b);\n  const colX = v => 20 + views.indexOf(v)*150;\n  const perView={}; const pos={};\n  const BW=118,BH=52,VGAP=20;\n  blocks.forEach(b=>{\n    perView[b.view]=(perView[b.view]||0);\n    pos[b.hash]={x:colX(b.view), y:20+perView[b.view]*(BH+VGAP)};\n    perView[b.view]++;\n  });\n  const width = 20 + views.length*150 + 20;\n  const maxRows=Math.max(...Object.values(perView));\n  const height = 20 + maxRows*(BH+VGAP) + 30;\n  svg.setAttribute(\"width\",Math.max(width,300));\n  svg.setAttribute(\"height\",height);\n  svg.setAttribute(\"viewBox\",`0 0 ${Math.max(width,300)} ${height}`);\n\n  let g=\"\";\n  // edges parent->child\n  blocks.forEach(b=>{\n    if(b.parent && pos[b.parent]){\n      const c=pos[b.hash], p=pos[b.parent];\n      const chain = b.status===\"committed\" && st.blocks.get(b.parent) && st.blocks.get(b.parent).status===\"committed\";\n      const x1=p.x+BW, y1=p.y+BH/2, x2=c.x, y2=c.y+BH/2, mx=(x1+x2)/2;\n      g+=`<path class=\"tree-edge${chain?\" chain\":\"\"}\" d=\"M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}\"/>`;\n    }\n  });\n  // blocks\n  const FILL={proposed:\"#16202b\",qc:\"#1a2b3a\",locked:\"#3a2c10\",committed:\"#12331f\"};\n  const STROKE={proposed:\"#2a3947\",qc:getVar(\"--p-prepare\"),locked:getVar(\"--p-commit\"),committed:getVar(\"--p-decide\")};\n  blocks.forEach(b=>{\n    const p=pos[b.hash];\n    const cmd=(b.cmd||\"\").replace(/^TRANSFER\\(/,\"\").replace(/\\)$/,\"\");\n    const label = b.status===\"locked\"?\"🔒 LOCKED\":b.status===\"committed\"?\"✓ COMMITTED\":b.status===\"qc\"?\"QC\":\"proposed\";\n    g+=`<g class=\"blk\" data-node=\"${b.hash}\">\n      <rect x=\"${p.x}\" y=\"${p.y}\" width=\"${BW}\" height=\"${BH}\" rx=\"7\" fill=\"${FILL[b.status]}\" stroke=\"${STROKE[b.status]}\" stroke-width=\"${b.status===\"proposed\"?1:1.8}\"/>\n      <text class=\"b-hash\" x=\"${p.x+9}\" y=\"${p.y+16}\">${b.hash}<\u002Ftext>\n      <text class=\"b-meta\" x=\"${p.x+BW-9}\" y=\"${p.y+16}\" text-anchor=\"end\">v${b.view} · ${label}<\u002Ftext>\n      <text class=\"b-cmd\" x=\"${p.x+9}\" y=\"${p.y+38}\">${esc(cmd||\"·\")}<\u002Ftext>\n    <\u002Fg>`;\n  });\n  svg.innerHTML=g;\n  // click a block → jump to its first event\n  svg.querySelectorAll(\".blk\").forEach(el=>{\n    el.style.cursor=\"pointer\";\n    el.addEventListener(\"click\",()=>{\n      const node=el.dataset.node;\n      const i=EVENTS.findIndex(e=>e.node===node);\n      if(i>=0) seekToIndex(i+1);\n    });\n  });\n}\n\n/* =========================================================================\n   4. MESSAGE BUS  (SVG + rAF-driven moving dots)\n   ========================================================================= */\nlet flights=[];  // {from,to,color,t0,dur,dropped}\nfunction buildBus(){\n  const svg=document.getElementById(\"bus-svg\");\n  let g=\"\";\n  // edges between every pair (faint)\n  for(let a=0;a<4;a++)for(let b=a+1;b<4;b++){\n    g+=`<line class=\"bus-edge\" x1=\"${NODE_POS[a].x}\" y1=\"${NODE_POS[a].y}\" x2=\"${NODE_POS[b].x}\" y2=\"${NODE_POS[b].y}\"/>`;\n  }\n  // nodes\n  BANKS.forEach((b,i)=>{\n    g+=`<g data-bus=\"${i}\">\n      <circle class=\"bus-node-ring\" cx=\"${NODE_POS[i].x}\" cy=\"${NODE_POS[i].y}\" r=\"${NODE_R}\"/>\n      <text class=\"bus-node-label\" x=\"${NODE_POS[i].x}\" y=\"${NODE_POS[i].y}\">${b}<\u002Ftext>\n    <\u002Fg>`;\n  });\n  g+=`<g id=\"flight-layer\"><\u002Fg>`;\n  // legend\n  const leg=[[\"prepare\",\"--p-prepare\"],[\"pre-commit\",\"--p-precommit\"],[\"commit\",\"--p-commit\"],[\"decide\",\"--p-decide\"]];\n  leg.forEach(([n,v],i)=>{\n    g+=`<g class=\"bus-legend\"><circle cx=\"14\" cy=\"${16+i*15}\" r=\"4\" fill=\"${getVar(v)}\"/><text x=\"24\" y=\"${19+i*15}\">${n}<\u002Ftext><\u002Fg>`;\n  });\n  svg.innerHTML=g;\n}\n/* refresh bus node ring roles from state (leader/crash/byz) */\nfunction refreshBusNodes(st){\n  const svg=document.getElementById(\"bus-svg\");\n  st.replicas.forEach((r,i)=>{\n    const ring=svg.querySelector(`g[data-bus=\"${i}\"] .bus-node-ring`);\n    if(!ring) return;\n    const role=roleOf(r,st);\n    ring.className.baseVal=\"bus-node-ring\"+(role===\"LEADER\"?\" leader\":role===\"CRASHED\"?\" crashed\":role===\"BYZANTINE\"?\" byz\":\"\");\n  });\n}\n/* spawn message dots for a fired event */\nfunction spawnMessages(e){\n  const phase=e.phase||\"generic\";\n  const color=PHASE_COLOR[phase]||PHASE_COLOR.generic;\n  const now=performance.now();\n  const dur=520;\n  if(e.kind===\"PROPOSE\"||e.kind===\"EQUIVOCATE\"||e.kind===\"CENSOR\"){\n    // broadcast leader -> all others\n    const src = e.from!=null?e.from:(e.replica!=null?e.replica:0);\n    for(let j=0;j<4;j++){ if(j!==src) flights.push({from:src,to:j,color,t0:now,dur,dropped:e.kind===\"CENSOR\"}); }\n  } else if(e.kind===\"DROP\"){\n    if(e.from!=null&&e.to!=null) flights.push({from:e.from,to:e.to,color:getVar(\"--bad\"),t0:now,dur,dropped:true});\n  } else if(e.from!=null && e.to!=null){\n    flights.push({from:e.from,to:e.to,color:(e.kind===\"vote\"?color:color),t0:now,dur,dropped:false});\n  }\n  const hint=document.getElementById(\"bus-hint\");\n  hint.textContent = flights.length? (e.kind===\"PROPOSE\"?\"broadcast · \"+phase : e.kind===\"vote\"?\"vote · \"+phase : e.kind.toLowerCase()) : \"idle\";\n}\nfunction busLoop(){\n  const layer=document.getElementById(\"flight-layer\");\n  if(layer){\n    const now=performance.now();\n    flights=flights.filter(f=>now-f.t0 < f.dur+120);\n    let g=\"\";\n    flights.forEach(f=>{\n      const raw=(now-f.t0)/f.dur; const p=Math.min(1,raw);\n      const a=NODE_POS[f.from], b=NODE_POS[f.to];\n      // start/end just outside node rings\n      const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;\n      const sx=a.x+ux*NODE_R, sy=a.y+uy*NODE_R, ex=b.x-ux*NODE_R, ey=b.y-uy*NODE_R;\n      let cx=sx+(ex-sx)*p, cy=sy+(ey-sy)*p, op=1;\n      if(f.dropped){\n        if(p>=0.5){ op=Math.max(0,1-(p-0.5)*2.2); } // fade out mid-flight\n        const drawP=Math.min(p,0.55);\n        cx=sx+(ex-sx)*drawP; cy=sy+(ey-sy)*drawP;\n        g+=`<circle cx=\"${cx}\" cy=\"${cy}\" r=\"5\" fill=\"${f.color}\" opacity=\"${op}\"/>`;\n        g+=`<circle cx=\"${cx}\" cy=\"${cy}\" r=\"9\" fill=\"none\" stroke=\"${f.color}\" stroke-width=\"1\" stroke-dasharray=\"2 3\" opacity=\"${op*0.8}\"/>`;\n        if(p>0.5&&p<0.9) g+=`<text x=\"${cx+8}\" y=\"${cy-6}\" fill=\"${f.color}\" font-family=\"var(--mono)\" font-size=\"8\" opacity=\"${op}\">DROP<\u002Ftext>`;\n      } else {\n        if(p>=1) op=Math.max(0,1-(raw-1)*3);\n        g+=`<circle cx=\"${cx}\" cy=\"${cy}\" r=\"5.5\" fill=\"${f.color}\" opacity=\"${op}\"><animate attributeName=\"r\" values=\"5.5;6.5;5.5\" dur=\"0.5s\" repeatCount=\"indefinite\"/><\u002Fcircle>`;\n      }\n    });\n    layer.innerHTML=g;\n    if(!flights.length) document.getElementById(\"bus-hint\").textContent=\"idle\";\n  }\n  requestAnimationFrame(busLoop);\n}\n\n/* =========================================================================\n   5. EVENT LOG (+ filters, click-to-seek)\n   ========================================================================= */\nfunction buildKindFilter(){\n  const kinds=[...new Set(EVENTS.map(e=>e.kind))];\n  const sel=document.getElementById(\"filter-kind\");\n  const val=sel.value;\n  sel.innerHTML=`<option value=\"\">all kinds<\u002Foption>`+kinds.map(k=>`<option value=\"${k}\">${k}<\u002Foption>`).join(\"\");\n  if(kinds.includes(val)) sel.value=val;\n}\nfunction renderLog(){\n  const list=document.getElementById(\"log-list\");\n  const fr=document.getElementById(\"filter-replica\").value;\n  const fk=document.getElementById(\"filter-kind\").value;\n  let html=\"\";\n  EVENTS.forEach((e,i)=>{\n    if(fr!==\"\"){ if(fr===\"null\"){ if(e.replica!=null) return; } else if(String(e.replica)!==fr) return; }\n    if(fk!==\"\" && e.kind!==fk) return;\n    const future = i>=cur;\n    const c=KIND_COLOR[e.kind]||\"#8b97a6\";\n    html+=`<div class=\"logline ${i===cur-1?\"cur\":\"\"} ${future?\"future\":\"\"}\" data-i=\"${i}\">\n      <span class=\"lt\">${e.t.toFixed(2)}<\u002Fspan>\n      <span class=\"lk\" style=\"color:${c}\">${e.kind}<\u002Fspan>\n      <span class=\"ld\">${esc(e.detail||\"\")}<\u002Fspan>\n    <\u002Fdiv>`;\n  });\n  list.innerHTML=html;\n  list.querySelectorAll(\".logline\").forEach(el=>{\n    el.addEventListener(\"click\",()=>seekToIndex(parseInt(el.dataset.i)+1));\n  });\n  // keep current line in view (without scrollIntoView)\n  const curEl=list.querySelector(\".logline.cur\");\n  if(curEl){\n    const top=curEl.offsetTop, h=curEl.offsetHeight, vt=list.scrollTop, vh=list.clientHeight;\n    if(top<vt||top+h>vt+vh) list.scrollTop=top-vh/2+h/2;\n  }\n}\n\n/* =========================================================================\n   6. TOOLTIP\n   ========================================================================= */\nconst tipEl=document.getElementById(\"tip\");\nlet tipReplica=null;\nfunction showTip(i){ tipReplica=i; updateTip(); tipEl.classList.add(\"on\"); }\nfunction hideTip(){ tipReplica=null; tipEl.classList.remove(\"on\"); }\nfunction moveTip(e){\n  let x=e.clientX+14, y=e.clientY+14;\n  if(x+290>innerWidth) x=e.clientX-290;\n  if(y+160>innerHeight) y=e.clientY-160;\n  tipEl.style.left=x+\"px\"; tipEl.style.top=y+\"px\";\n}\nfunction updateTip(){\n  if(tipReplica==null) return;\n  const st=computeState(cur); const r=st.replicas[tipReplica]; const role=roleOf(r,st);\n  tipEl.innerHTML=`<div class=\"tt-title\">Bank ${r.name} · replica ${r.i} — ${role}<\u002Fdiv>\n    <div class=\"tt-row\"><span class=\"k\">current view<\u002Fspan><span>${r.view}<\u002Fspan><\u002Fdiv>\n    <div class=\"tt-row\"><span class=\"k\">lockedQC.view<\u002Fspan><span>${r.lockedQC!=null?\"v\"+r.lockedQC:\"none\"}<\u002Fspan><\u002Fdiv>\n    <div class=\"tt-row\"><span class=\"k\">prepareQC.view<\u002Fspan><span>${r.prepareQC!=null?\"v\"+r.prepareQC:\"none\"}<\u002Fspan><\u002Fdiv>\n    <div class=\"tt-row\"><span class=\"k\">committed<\u002Fspan><span>${r.committed}<\u002Fspan><\u002Fdiv>\n    <div class=\"tt-row\"><span class=\"k\">last vote<\u002Fspan><span>${r.lastVote||\"—\"}<\u002Fspan><\u002Fdiv>\n    <div class=\"tt-row\" style=\"margin-top:5px\"><span class=\"k\">balance<\u002Fspan><span>${st.balances[r.name]}<\u002Fspan><\u002Fdiv>`;\n}\n\n/* =========================================================================\n   7. PLAYBACK ENGINE\n      curT drives everything; cur = #events with t <= curT.\n   ========================================================================= */\nlet playing=false, speed=1, lastFrame=0;\nfunction maxT(){ return EVENTS.length?EVENTS[EVENTS.length-1].t:0; }\n\nfunction updateAndRender(){\n  const st=computeState(cur);\n  render(st);\n  refreshBusNodes(st);\n  updateTip();\n  // controls readout\n  document.getElementById(\"clock-t\").textContent=curT.toFixed(2);\n  document.getElementById(\"clock-i\").textContent=cur;\n  document.getElementById(\"clock-n\").textContent=EVENTS.length;\n  const scrub=document.getElementById(\"scrub\");\n  scrub.value = Math.round((maxT()? curT/maxT():0)*1000);\n}\n\n/* advance time forward, firing (spawning messages) for crossed events */\nfunction tick(now){\n  if(playing){\n    const dt=(now-lastFrame)/1000*speed;\n    lastFrame=now;\n    let newT=curT+dt;\n    const end=maxT()+0.2;\n    if(newT>=end){ newT=end; }\n    // fire events crossed\n    while(cur<EVENTS.length && EVENTS[cur].t<=newT){\n      spawnMessages(EVENTS[cur]);\n      cur++;\n    }\n    curT=newT;\n    updateAndRender();\n    if(curT>=end){ playing=false; syncPlayBtn(); }\n  }\n  requestAnimationFrame(tick);\n}\n\n/* jump to a fired-event index (used by log/block clicks + step) — no spawn */\nfunction seekToIndex(idx){\n  idx=Math.max(0,Math.min(EVENTS.length,idx));\n  cur=idx;\n  curT = idx>0 ? EVENTS[idx-1].t : 0;\n  flights=[];\n  // pause on manual seek\n  playing=false; syncPlayBtn();\n  updateAndRender();\n}\n/* scrub by time */\nfunction seekToTime(t){\n  curT=t;\n  cur=EVENTS.filter(e=>e.t<=t).length;\n  flights=[];\n  updateAndRender();\n}\n\nfunction syncPlayBtn(){ document.getElementById(\"btn-play\").textContent = playing?\"⏸\":\"▶\"; }\n\n/* =========================================================================\n   8. SCENARIO LOADING + WIRING\n   ========================================================================= */\nfunction loadScenario(key){\n  EVENTS = SCENARIOS[key].events;\n  cur=0; curT=0; flights=[]; playing=false; syncPlayBtn();\n  buildKindFilter();\n  updateAndRender();\n}\n\nfunction init(){\n  // scenario dropdown\n  const sel=document.getElementById(\"scenario\");\n  sel.innerHTML=Object.entries(SCENARIOS).map(([k,v])=>`<option value=\"${k}\">${v.label}<\u002Foption>`).join(\"\");\n  sel.value=\"double-spend\";\n  sel.addEventListener(\"change\",()=>loadScenario(sel.value));\n\n  buildReplicaCards();\n  buildLedgerBars();\n  buildBus();\n  buildKindFilter();\n\n  // controls\n  document.getElementById(\"btn-play\").addEventListener(\"click\",()=>{\n    if(curT>=maxT()+0.19){ seekToTime(0); } // restart if at end\n    playing=!playing; lastFrame=performance.now(); syncPlayBtn();\n  });\n  document.getElementById(\"btn-fwd\").addEventListener(\"click\",()=>{\n    if(cur<EVENTS.length){ spawnMessages(EVENTS[cur]); cur++; curT=EVENTS[cur-1].t; playing=false; syncPlayBtn(); updateAndRender(); }\n  });\n  document.getElementById(\"btn-back\").addEventListener(\"click\",()=>{ seekToIndex(cur-1); });\n  document.getElementById(\"scrub\").addEventListener(\"input\",e=>{\n    playing=false; syncPlayBtn();\n    seekToTime(e.target.value/1000*maxT());\n  });\n  document.getElementById(\"speed\").addEventListener(\"change\",e=>{ speed=parseFloat(e.target.value); });\n  document.getElementById(\"filter-replica\").addEventListener(\"change\",renderLog);\n  document.getElementById(\"filter-kind\").addEventListener(\"change\",renderLog);\n\n  // keyboard\n  document.addEventListener(\"keydown\",e=>{\n    if(e.target.tagName===\"SELECT\") return;\n    if(e.code===\"Space\"){ e.preventDefault(); document.getElementById(\"btn-play\").click(); }\n    else if(e.code===\"ArrowRight\") document.getElementById(\"btn-fwd\").click();\n    else if(e.code===\"ArrowLeft\") document.getElementById(\"btn-back\").click();\n  });\n\n  updateAndRender();\n  requestAnimationFrame(tick);\n  requestAnimationFrame(busLoop);\n}\n\n/* small helper */\nfunction esc(s){ return String(s==null?\"\":s).replace(/[&<>\"]/g,c=>({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\"}[c])); }\n\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
