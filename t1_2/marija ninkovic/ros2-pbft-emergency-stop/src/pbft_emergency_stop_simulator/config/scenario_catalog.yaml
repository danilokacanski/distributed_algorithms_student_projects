version: 3
defaults:
  replica_count: 4
  timeout_sec: 15.0
  supervisor:
    enabled: true
    parameters:
      replica_count: 4
      max_faulty: 1
      decision_timeout_sec: 8.0
      allow_confirmed_release: false
      heartbeat_period_sec: 0.5
  client:
    enabled: false
  tags: []
  execution_mode: legacy_n4_f1
scenarios:
- id: normal_consensus
  name: Normal consensus
  category: Normal operation
  description: Four correct replicas commit an emergency-stop request in view 0.
  launch:
    package: pbft_emergency_stop_simulator
    file: pbft_simulator.launch.py
  client:
    enabled: true
    start_delay_sec: 0.8
    parameters:
      primary_id: 0
      current_view: 0
      emergency_stop: true
      request_id: web-normal-consensus
      publish_delay_sec: 0.8
  complete_when:
    mode: all
    conditions:
    - path: decision.committed
      op: eq
      value: true
    - path: safety.state
      op: eq
      value: CONFIRMED_STOP
  assertions:
  - id: decision_received
    label: Confirmed PBFT decision was published
    path: decision.committed
    op: eq
    value: true
  - id: decision_view_zero
    label: Decision remained in view 0
    path: decision.view
    op: eq
    value: 0
  - id: confirmation_quorum
    label: Decision has at least three confirmations
    path: decision.confirmation_count
    op: gte
    value: 3
  - id: final_view_zero
    label: No view change occurred
    path: current_view
    op: eq
    value: 0
  - id: no_new_view
    label: No NEW-VIEW was published
    path: counts.new_view
    op: eq
    value: 0
  - id: safety_confirmed
    label: Safety supervisor reached CONFIRMED_STOP
    path: safety.state
    op: eq
    value: CONFIRMED_STOP
  - id: output_active
    label: Effective emergency-stop output is active
    path: safety.emergency_stop
    op: eq
    value: true
- id: normal_progress_timeout
  name: Normal progress cancels timeout
  category: Normal operation
  description: All replicas use progress timers, but normal PBFT progress prevents
    a view change.
  launch:
    package: pbft_emergency_stop_simulator
    file: pbft_progress_timeout_normal_scenario.launch.py
  client:
    enabled: false
  complete_when:
    mode: all
    conditions:
    - path: decision.committed
      op: eq
      value: true
    - path: safety.state
      op: eq
      value: CONFIRMED_STOP
  assertions:
  - id: decision_received
    label: Confirmed PBFT decision was published
    path: decision.committed
    op: eq
    value: true
  - id: decision_view_zero
    label: Decision remained in view 0
    path: decision.view
    op: eq
    value: 0
  - id: confirmation_quorum
    label: Decision has at least three confirmations
    path: decision.confirmation_count
    op: gte
    value: 3
  - id: final_view_zero
    label: No view change occurred
    path: current_view
    op: eq
    value: 0
  - id: no_new_view
    label: No NEW-VIEW was published
    path: counts.new_view
    op: eq
    value: 0
  - id: safety_confirmed
    label: Safety supervisor reached CONFIRMED_STOP
    path: safety.state
    op: eq
    value: CONFIRMED_STOP
  - id: output_active
    label: Effective emergency-stop output is active
    path: safety.emergency_stop
    op: eq
    value: true
  - id: no_view_change_votes
    label: No VIEW-CHANGE was triggered
    path: counts.view_change
    op: eq
    value: 0
  - id: three_committed
    label: At least three replicas committed in view 0
    path: history.committed_replicas_by_view.0
    op: length_gte
    value: 3
- id: silent_replica
  name: Silent Byzantine replica
  category: Byzantine backup faults
  description: Replica 3 accepts PRE-PREPARE but remains silent.
  launch:
    package: pbft_emergency_stop_simulator
    file: pbft_silent_scenario.launch.py
  client:
    enabled: true
    start_delay_sec: 0.8
    parameters:
      primary_id: 0
      current_view: 0
      emergency_stop: true
      request_id: web-silent
      publish_delay_sec: 0.8
  complete_when:
    mode: all
    conditions:
    - path: decision.committed
      op: eq
      value: true
    - path: safety.state
      op: eq
      value: CONFIRMED_STOP
    - path: replica_detail_history.3
      op: any_contains
      value: silent Byzantine
  assertions:
  - id: decision_received
    label: Confirmed PBFT decision was published
    path: decision.committed
    op: eq
    value: true
  - id: decision_view_zero
    label: Decision remained in view 0
    path: decision.view
    op: eq
    value: 0
  - id: confirmation_quorum
    label: Decision has at least three confirmations
    path: decision.confirmation_count
    op: gte
    value: 3
  - id: final_view_zero
    label: No view change occurred
    path: current_view
    op: eq
    value: 0
  - id: no_new_view
    label: No NEW-VIEW was published
    path: counts.new_view
    op: eq
    value: 0
  - id: safety_confirmed
    label: Safety supervisor reached CONFIRMED_STOP
    path: safety.state
    op: eq
    value: CONFIRMED_STOP
  - id: output_active
    label: Effective emergency-stop output is active
    path: safety.emergency_stop
    op: eq
    value: true
  - id: fault_observed
    label: Replica 3 entered silent mode
    path: replica_detail_history.3
    op: any_contains
    value: silent Byzantine
  - id: no_prepare_from_faulty
    label: Silent replica sent no PREPARE
    path: counts.prepare_by_sender.3
    op: not_exists
  - id: no_commit_from_faulty
    label: Silent replica sent no COMMIT
    path: counts.commit_by_sender.3
    op: not_exists
  timeout_sec: 15.0
