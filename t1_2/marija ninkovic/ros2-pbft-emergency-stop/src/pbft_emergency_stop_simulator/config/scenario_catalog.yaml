    op: eq
    value: 1
  - id: one_recovery
    label: Exactly one recovery PRE-PREPARE was published
    path: counts.recovery_pre_prepare
    op: eq
    value: 1
  - id: decision_view_one
    label: Decision was committed in view 1
    path: decision.view
    op: eq
    value: 1
  - id: decision_quorum
    label: Decision has at least three confirmations
    path: decision.confirmation_count
    op: gte
    value: 3
  - id: safety_confirmed
    label: Safety supervisor reached CONFIRMED_STOP
    path: safety.state
    op: eq
    value: CONFIRMED_STOP
  - id: output_active
    label: Emergency-stop output is active
    path: safety.emergency_stop
    op: eq
    value: true
- id: insufficient_view_change_quorum
  name: Insufficient VIEW-CHANGE quorum
  category: View change
  description: Only replicas 1 and 2 time out; no NEW-VIEW is allowed and safety falls
