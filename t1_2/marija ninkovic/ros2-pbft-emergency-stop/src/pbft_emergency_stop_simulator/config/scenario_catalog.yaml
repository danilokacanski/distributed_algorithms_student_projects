    label: Exactly one VIEW-CHANGE was published
    path: counts.view_change
    op: eq
    value: 1
  - id: sender_one
    label: Replica 1 sent the VIEW-CHANGE
    path: last.view_change.sender_id
    op: eq
    value: 1
  - id: certificate_present
    label: The PREPARED certificate is present
    path: last.view_change.has_prepared_certificate
    op: eq
    value: true
  - id: prepared_view_zero
    label: Certificate belongs to view 0
    path: last.view_change.prepared_view
    op: eq
    value: 0
  - id: prepared_sequence_one
    label: Certificate carries sequence 1
    path: last.view_change.prepared_sequence_number
    op: eq
    value: 1
  - id: prepared_request_preserved
    label: Certificate identifies the prepared request
    path: last.view_change.request_id
    op: eq
    value: prepared-certificate-test
  - id: no_new_view
    label: One VIEW-CHANGE vote cannot create NEW-VIEW
    path: counts.new_view
    op: eq
    value: 0
- id: prepared_value_preservation
  name: PREPARED value preservation
  category: View change
  description: Three PREPARED certificates force the new primary to recover exactly
    the same request in view 1.
  launch:
    package: pbft_emergency_stop_simulator
    file: pbft_prepared_new_view_scenario.launch.py
  client:
    enabled: false
  timeout_sec: 15.0
  supervisor:
    enabled: true
    parameters:
      replica_count: 4
      max_faulty: 1
      decision_timeout_sec: 8.0
      allow_confirmed_release: false
      heartbeat_period_sec: 0.5
  complete_when:
    mode: all
    conditions:
    - path: current_view
      op: eq
      value: 1
    - path: history.prepared_replicas_by_view.1
      op: length_gte
      value: 3
    - path: safety.state
      op: eq
      value: FAIL_SAFE_STOP
  assertions:
  - id: prepared_old_view
    label: At least three replicas were PREPARED in view 0
