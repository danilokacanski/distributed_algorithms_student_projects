- id: insufficient_commit_quorum
  name: Insufficient COMMIT quorum
  category: Quorum and fail-safe
  description: Two replicas skip COMMIT, so no distributed decision is allowed and
    the supervisor latches fail-safe stop.
  launch:
    package: pbft_emergency_stop_simulator
    file: pbft_insufficient_quorum_scenario.launch.py
  client:
    enabled: true
    start_delay_sec: 0.8
    parameters:
      primary_id: 0
      current_view: 0
      emergency_stop: true
      request_id: web-insufficient-commit
      publish_delay_sec: 0.8
  supervisor:
    enabled: true
    parameters:
      replica_count: 4
      max_faulty: 1
      decision_timeout_sec: 6.0
      allow_confirmed_release: false
      heartbeat_period_sec: 0.5
  timeout_sec: 12.0
  complete_when:
    mode: all
    conditions:
    - path: safety.state
      op: eq
      value: FAIL_SAFE_STOP
    - path: safety.emergency_stop
      op: eq
      value: true
  assertions:
  - id: prepared_exists
    label: At least three replicas reached PREPARED
    path: history.prepared_replicas_by_view.0
    op: length_gte
    value: 3
  - id: no_commit_quorum
    label: No replica reached COMMITTED
    path: history.committed_replicas_by_view.0
    op: not_exists
  - id: no_decision
    label: No PBFT decision was published
    path: decision
    op: not_exists
  - id: fail_safe
    label: Safety supervisor latched FAIL_SAFE_STOP
    path: safety.state
    op: eq
    value: FAIL_SAFE_STOP
  - id: output_active
    label: Emergency-stop output remains active
    path: safety.emergency_stop
    op: eq
    value: true
- id: manual_view_change
  name: Single manual VIEW-CHANGE
  category: View-change construction
  description: Replica 2 publishes one controlled VIEW-CHANGE without a PREPARED certificate;
    quorum must not form.
  launch:
    package: pbft_emergency_stop_simulator
    file: pbft_manual_view_change_scenario.launch.py
  client:
    enabled: false
  supervisor:
    enabled: false
  timeout_sec: 7.0
  complete_when:
    mode: all
    conditions:
    - path: counts.view_change
      op: gte
      value: 1
  assertions:
  - id: one_vote
    label: Exactly one VIEW-CHANGE was published
    path: counts.view_change
    op: eq
    value: 1
  - id: sender_two
    label: Replica 2 sent the VIEW-CHANGE
    path: last.view_change.sender_id
    op: eq
    value: 2
  - id: no_certificate
    label: VIEW-CHANGE contains no PREPARED certificate
    path: last.view_change.has_prepared_certificate
    op: eq
    value: false
  - id: no_new_view
    label: A single vote cannot create NEW-VIEW
    path: counts.new_view
    op: eq
    value: 0
  - id: view_unchanged
    label: Current view remains 0
    path: current_view
    op: eq
    value: 0
  - id: no_decision
    label: No client decision exists in this construction test
    path: decision
    op: not_exists
- id: prepared_view_change_certificate
  name: VIEW-CHANGE with PREPARED certificate
  category: View-change construction
  description: Replica 1 constructs one VIEW-CHANGE carrying its local PREPARED certificate.
  launch:
    package: pbft_emergency_stop_simulator
