    op: length_gte
    value: 3
  - id: three_certificates
    label: Three VIEW-CHANGE messages carried PREPARED certificates
    path: counts.view_change_with_prepared_certificate
    op: gte
    value: 3
  - id: one_new_view
    label: Exactly one NEW-VIEW was published
    path: counts.new_view_by_view.1
    op: eq
    value: 1
  - id: selected_from_certificate
    label: NEW-VIEW selected the certified value
    path: last.new_view.selected_from_prepared_certificate
    op: eq
    value: true
  - id: request_preserved
    label: The same request_id was selected
    path: last.new_view.request_id
    op: eq
    value: prepared-new-view-test
  - id: sequence_preserved
    label: The certified sequence number was preserved
    path: last.new_view.selected_sequence_number
    op: eq
    value: 1
  - id: recovery_once
    label: Exactly one recovery PRE-PREPARE was published
    path: counts.recovery_pre_prepare
    op: eq
    value: 1
  - id: prepared_new_view
    label: At least three replicas became PREPARED in view 1
    path: history.prepared_replicas_by_view.1
    op: length_gte
    value: 3
  - id: no_decision
    label: Two skip-COMMIT replicas prevent a decision
    path: decision
    op: not_exists
  - id: fail_safe
    label: Missing decision causes FAIL_SAFE_STOP
    path: safety.state
    op: eq
    value: FAIL_SAFE_STOP
  - id: output_active
    label: Emergency-stop output remains active
    path: safety.emergency_stop
    op: eq
    value: true
